name: superset

x-superset-image: &superset-image
  image: local/superset
  build: ./superset
x-superset-env: &superset-env
  SUPERSET_CONFIG_PATH: /bootstrap/config.py
  SUPERSET_METADATA_DB_URI: postgresql://${SA_USERNAME}:${SA_PASSWORD}@superset-db:5432/${SUPERSET_DB}
  SUPERSET_DATASET_DB_URI: postgresql://${SA_USERNAME}:${SA_PASSWORD}@dataset-db:5432/${DATASET_DB}

x-postgres-image: &postgres-image
  image: postgres

services:
  # Superset
  superset:
    container_name: superset
    <<: *superset-image
    env_file:
      .env
    environment:
      <<: *superset-env
    volumes:
      - ./superset/config.py:/bootstrap/config.py:ro
    ports:
      - '8088:8088'
    depends_on:
      superset-init:
        condition: service_completed_successfully
      dataset-db:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -sSf http://localhost:8088/health']
      interval: 5s
      timeout: 5s
      retries: 30

  superset-init:
    container_name: superset-init
    <<: *superset-image
    env_file:
      .env
    environment:
      <<: *superset-env
    volumes:
      - ./superset:/bootstrap:ro
    entrypoint: ['/bin/bash', '/bootstrap/init.sh']
    depends_on:
      superset-db:
        condition: service_healthy

  superset-db:
    container_name: superset-db
    <<: *postgres-image
    env_file:
      .env
    environment:
      POSTGRES_DB: ${SUPERSET_DB}
      POSTGRES_USER: ${SA_USERNAME}
      POSTGRES_PASSWORD: ${SA_PASSWORD}
    volumes:
      - superset-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', "pg_isready -U ${SA_USERNAME}"]
      interval: 5s
      timeout: 5s
      retries: 30

  # Dataset
  dataset-db:
    container_name: dataset-db
    <<: *postgres-image
    env_file:
      .env
    environment:
      POSTGRES_DB: ${DATASET_DB}
      POSTGRES_USER: ${SA_USERNAME}
      POSTGRES_PASSWORD: ${SA_PASSWORD}
    volumes:
      - ./dataset:/docker-entrypoint-initdb.d:ro
      - dataset-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', "pg_isready -U ${SA_USERNAME}"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  superset-db-volume:
  dataset-db-volume:
